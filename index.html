<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocktailmaster 2.0 – Cocktail Master</title>
    <meta name="description" content="Find cocktail recipes by selecting the ingredients you have at your bar.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ── משתני עיצוב - פלטת בר יוקרתי בהיר (שיש, שמפנייה וזהב מוברש) ──────────────────────── */
        :root {
            --bg-gradient-start: #FAF8F5; /* גוון שמנת-שנהב רך ויוקרתי */
            --bg-gradient-end: #EFEBE4;   /* גוון אבן טרוורטין בהירה */
            --container-bg: #FFFFFF;      /* כרטיס לבן נקי ובוהק */
            --border-color: rgba(169, 130, 56, 0.2); /* מסגרת זהב שמפנייה עדינה */
            --accent-color: #A98238;      /* זהב מוברש עמוק לקריאות מושלמת */
            --accent-hover: #C5A059;      /* זהב שמפנייה זוהר במעבר עכבר */
            --text-color: #241E1A;        /* חום אספרסו עמוק ומתוחכם לטקסט הראשי */
            --text-muted: #7A6E65;        /* גוון ברונזה-אפרפר עמום לטקסט משני */
            --input-bg: #FDFDFD;          /* רקע אזור התוצאות */
        }

        /* ── Reset & Base ───────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px 60px;
        }

        /* ── Container ──────────────────────────────────────── */
        .container {
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            padding: 36px 32px 40px;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(36, 30, 26, 0.05); /* צל סופר-רך ויוקרתי */
            width: 100%;
            max-width: 720px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--accent-hover), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        /* ── Category Sections ──────────────────────────────── */
        .category {
            margin-bottom: 24px;
        }

        .category-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-color);
            letter-spacing: 0.3px;
        }

        .chips-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* ── Chip (label + hidden checkbox) ─────────────────── */
        .tag-label {
            cursor: pointer;
            user-select: none;
            display: inline-flex;
            align-items: center;
        }

        .tag-label input[type="checkbox"] {
            display: none;
        }

        .tag-text {
            display: inline-block;
            padding: 8px 18px;
            font-size: 0.88rem;
            font-weight: 500;
            border-radius: 20px;
            border: 1px solid rgba(36, 30, 26, 0.08); 
            background: rgba(36, 30, 26, 0.02);       
            color: var(--text-muted);
            transition: all 0.25s ease;
        }

        .tag-text:hover {
            background: rgba(169, 130, 56, 0.08);
            border-color: var(--accent-color);
            color: var(--text-color);
        }

        /* Checked state */
        .tag-label input[type="checkbox"]:checked+.tag-text {
            background: linear-gradient(135deg, var(--accent-hover), var(--accent-color));
            color: #FFFFFF; /* טקסט לבן נקי ובוהק על רקע הזהב היוקרתי */
            font-weight: 600;
            border-color: transparent;
            box-shadow: 0 6px 16px rgba(169, 130, 56, 0.25);
        }

        /* ── אזור כפתור החיפוש המרכזי ────────────────────────── */
        .button-row {
            display: flex;
            justify-content: center;
            margin-top: 28px;
        }

        #searchBtn {
            padding: 14px 40px;
            background: linear-gradient(135deg, var(--accent-hover), var(--accent-color));
            color: #FFFFFF;
            border: none;
            border-radius: 25px; /* מראה קפסולה יוקרתי */
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            letter-spacing: 0.5px;
            transition: transform 0.15s, box-shadow 0.2s;
            white-space: nowrap;
            box-shadow: 0 4px 14px rgba(169, 130, 56, 0.2);
        }

        #searchBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(169, 130, 56, 0.35);
        }

        #searchBtn:active {
            transform: translateY(0);
        }

        /* ── Results Area ───────────────────────────────────── */
        #resultsArea {
            display: block;
            margin-top: 36px;
            text-align: left;
            direction: ltr;
            background: var(--input-bg); 
            padding: 26px;
            border-radius: 14px;
            min-height: 48px;
            line-height: 1.75;
            border-left: 4px solid var(--accent-color);
            color: var(--text-muted);
            font-size: 0.95rem;
            border-top: 1px solid rgba(169, 130, 56, 0.1);
            border-bottom: 1px solid rgba(169, 130, 56, 0.1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }

        #resultsArea h3 {
            clear: both;             
            color: var(--accent-color);
            font-size: 1.4rem;       
            margin-top: 40px;
            margin-bottom: 18px;
            padding-top: 28px;
            border-top: 1px solid rgba(169, 130, 56, 0.15); 
            display: block;
            width: 100%;
        }

        #resultsArea h3:first-of-type {
            margin-top: 4px;
            padding-top: 0;
            border-top: none;
        }

        #resultsArea img {
            float: right;             
            width: 160px;            
            height: 160px;           
            object-fit: cover;       
            border-radius: 12px;     
            margin-left: 24px;      
            margin-bottom: 16px;     
            box-shadow: 0 8px 24px rgba(36, 30, 26, 0.08); /* צל רך ומעודן לתמונת הקוקטייל */
        }

        #resultsArea strong {
            color: var(--text-color);
        }

        #resultsArea ul {
            padding-left: 20px;
            margin-top: 5px;
        }

        #resultsArea li {
            margin-bottom: 6px;
            color: var(--text-color);
        }

        /* ── Responsive ─────────────────────────────────────── */
        @media (max-width: 500px) {
            .container {
                padding: 28px 20px 32px;
            }

            h1 {
                font-size: 1.6rem;
            }

            #searchBtn {
                width: 100%;
            }
            
            #resultsArea img {
                float: none;
                margin: 0 auto 15px;
                display: block;
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🍸 Cocktailmaster 2.0</h1>
        <p class="subtitle">Choose the ingredients you have at your bar</p>
        
        <div class="category">
            <div class="category-title">🥃 Base Spirits</div>
            <div class="chips-grid">
                <label class="tag-label"><input type="checkbox" value="Vodka"><span class="tag-text">Vodka</span></label>
                <label class="tag-label"><input type="checkbox" value="Gin"><span class="tag-text">Gin</span></label>
                <label class="tag-label"><input type="checkbox" value="Tequila"><span class="tag-text">Tequila</span></label>
                <label class="tag-label"><input type="checkbox" value="Mezcal"><span class="tag-text">Mezcal</span></label>
                <label class="tag-label"><input type="checkbox" value="Whiskey"><span class="tag-text">Whiskey</span></label>
                <label class="tag-label"><input type="checkbox" value="Smoked Whiskey"><span class="tag-text">Smoked Whiskey</span></label>
                <label class="tag-label"><input type="checkbox" value="White Rum"><span class="tag-text">White Rum</span></label>
                <label class="tag-label"><input type="checkbox" value="Dark Rum"><span class="tag-text">Dark Rum</span></label>
                <label class="tag-label"><input type="checkbox" value="Brandy"><span class="tag-text">Brandy</span></label>
                <label class="tag-label"><input type="checkbox" value="Cognac"><span class="tag-text">Cognac</span></label>
                <label class="tag-label"> <input type="checkbox" value="Pisco, Cachaça, Calvados, Grappa"><span class="tag-text">Other Base Spirits</span></label>
            </div>
        </div>

        <div class="category">
            <div class="category-title">🍾 Liqueurs & Wine</div>
            <div class="chips-grid">
                <label class="tag-label"><input type="checkbox" value="Orange Liqueur"><span class="tag-text">Orange Liqueur </span></label>
                <label class="tag-label"><input type="checkbox" value="Campari"><span class="tag-text">Campari</span></label>
                <label class="tag-label"><input type="checkbox" value="Aperol"><span class="tag-text">Aperol</span></label>
                <label class="tag-label"><input type="checkbox" value="Coffee Liqueur"><span class="tag-text">Coffee Liqueur (Kahlúa)</span></label>
                <label class="tag-label"><input type="checkbox" value="Amaretto"><span class="tag-text">Amaretto (Almond)</span></label>
                <label class="tag-label"><input type="checkbox" value="Sweet Vermouth"><span class="tag-text">Sweet Vermouth</span></label>
                <label class="tag-label"><input type="checkbox" value="Dry Vermouth"><span class="tag-text">Dry Vermouth</span></label>
                <label class="tag-label"><input type="checkbox" value="Chartreuse"><span class="tag-text">Chartreuse</span></label>
                <label class="tag-label"><input type="checkbox" value="Absinthe"><span class="tag-text">Absinthe</span></label>
                <label class="tag-label"><input type="checkbox" value="Sparkling Wine"><span class="tag-text">Sparkling Wine (Champagne / Cava)</span></label>
                <label class="tag-label"><input type="checkbox" value="Wine"><span class="tag-text">Wine (White / Red)</span></label>
            </div>
        </div>

        <div class="category">
            <div class="category-title">🍯 Syrups & Sweeteners</div>
            <div class="chips-grid">
                <label class="tag-label"><input type="checkbox" value="Sugar Syrup"><span class="tag-text">Simple Syrup</span></label>
                <label class="tag-label"><input type="checkbox" value="Grenadine"><span class="tag-text">Grenadine</span></label>
                <label class="tag-label"><input type="checkbox" value="Honey Syrup"><span class="tag-text">Honey Syrup</span></label>
                <label class="tag-label"><input type="checkbox" value="Orgeat"><span class="tag-text">Orgeat (Almond Syrup)</span></label>
                <label class="tag-label"><input type="checkbox" value="Sugar"><span class="tag-text">Sugar</span></label>
            </div>
        </div>

        <div class="category">
            <div class="category-title">🍋 Juices & Mixers</div>
            <div class="chips-grid">
                <label class="tag-label"><input type="checkbox" value="Lemon Juice"><span class="tag-text">Lemon Juice</span></label>
                <label class="tag-label"><input type="checkbox" value="Lime Juice"><span class="tag-text">Lime Juice</span></label>
                <label class="tag-label"><input type="checkbox" value="Orange Juice"><span class="tag-text">Orange Juice</span></label>
                <label class="tag-label"><input type="checkbox" value="Pineapple Juice"><span class="tag-text">Pineapple Juice</span></label>
                <label class="tag-label"><input type="checkbox" value="Grapefruit Juice"><span class="tag-text">Grapefruit Juice</span></label>
                <label class="tag-label"><input type="checkbox" value="Cranberry Juice"><span class="tag-text">Cranberry Juice</span></label>
                <label class="tag-label"><input type="checkbox" value="Tomato Juice"><span class="tag-text">Tomato Juice</span></label>
                <label class="tag-label"><input type="checkbox" value="Soda Water"><span class="tag-text">Soda</span></label>
                <label class="tag-label"><input type="checkbox" value="Ginger Beer"><span class="tag-text">Ginger Beer</span></label>
                <label class="tag-label"><input type="checkbox" value="Ginger Ale"><span class="tag-text">Ginger Ale</span></label>
                <label class="tag-label"><input type="checkbox" value="Cola"><span class="tag-text">Cola</span></label>
                <label class="tag-label"><input type="checkbox" value="Espresso"><span class="tag-text">Espresso</span></label>
                <label class="tag-label"><input type="checkbox" value="Cream"><span class="tag-text">Cream</span></label>
            </div>
        </div>

        <div class="category">
            <div class="category-title">🌿 Bitters, Garnishes & Misc</div>
            <div class="chips-grid">
                <label class="tag-label"><input type="checkbox" value="Angostura Bitters"><span class="tag-text">Angostura Bitters</span></label>
                <label class="tag-label"><input type="checkbox" value="Orange Bitters"><span class="tag-text">Orange Bitters</span></label>
                <label class="tag-label"><input type="checkbox" value="Peychaud's Bitters"><span class="tag-text">Peychaud's Bitters</span></label>
                <label class="tag-label"><input type="checkbox" value="Mint"><span class="tag-text">Mint</span></label>
                <label class="tag-label"><input type="checkbox" value="Basil"><span class="tag-text">Basil</span></label>
                <label class="tag-label"><input type="checkbox" value="Egg White"><span class="tag-text">Egg White</span></label>
                <label class="tag-label"><input type="checkbox" value="Egg Yolk"><span class="tag-text">Egg Yolk</span></label>
                <label class="tag-label"><input type="checkbox" value="Salt"><span class="tag-text">Salt</span></label>
                <label class="tag-label"><input type="checkbox" value="Tabasco"><span class="tag-text">Tabasco</span></label>
                <label class="tag-label"><input type="checkbox" value="Worcestershire Sauce"><span class="tag-text">Worcestershire Sauce</span></label>
            </div>
        </div>

        <input type="hidden" id="ingredientsInput" value="">

        <div class="button-row">
            <button id="searchBtn" onclick="searchCocktails()">🔍 Search Cocktails</button>
        </div>

        <div id="resultsArea">Results will appear here...</div>
    </div>

    <script src="script.js"></script>
</body>

</html>
