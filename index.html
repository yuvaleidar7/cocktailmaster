<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocktailmaster 2.0 – מאסטר הקוקטיילים</title>
    <meta name="description" content="Find cocktail recipes by selecting the ingredients you have at your bar.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ── Reset & Base ───────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(145deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px 60px;
        }

        /* ── Container ──────────────────────────────────────── */
        .container {
            background: rgba(30, 30, 46, 0.85);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 36px 32px 40px;
            border-radius: 20px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.55);
            width: 100%;
            max-width: 720px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #ff9f43, #f7971e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        /* ── Category Sections ──────────────────────────────── */
        .category {
            margin-bottom: 22px;
        }

        .category-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: #ff9f43;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 159, 67, 0.2);
        }

        .chips-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* ── Chip (label + hidden checkbox) ─────────────────── */
        .tag-label {
            cursor: pointer;
            user-select: none;
            display: inline-flex;
            align-items: center;
        }

        .tag-label input[type="checkbox"] {
            display: none;
        }

        .tag-text {
            display: inline-block;
            padding: 7px 16px;
            font-size: 0.88rem;
            font-weight: 500;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            transition: all 0.2s ease;
        }

        .tag-text:hover {
            background: rgba(255, 159, 67, 0.15);
            border-color: rgba(255, 159, 67, 0.4);
            color: #fff;
        }

        /* Checked state */
        .tag-label input[type="checkbox"]:checked+.tag-text {
            background: linear-gradient(135deg, #ff9f43, #f39c12);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 2px 12px rgba(255, 159, 67, 0.35);
        }

        /* ── Free-text input ────────────────────────────────── */
        .input-row {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        #ingredientsInput {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        #ingredientsInput::placeholder {
            color: #666;
        }

        #ingredientsInput:focus {
            border-color: #ff9f43;
        }

        /* ── Search Button ──────────────────────────────────── */
        #searchBtn {
            padding: 12px 28px;
            background: linear-gradient(135deg, #ff9f43, #f39c12);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            transition: transform 0.15s, box-shadow 0.2s;
            white-space: nowrap;
        }

        #searchBtn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255, 159, 67, 0.4);
        }

        #searchBtn:active {
            transform: translateY(0);
        }

        /* ── Results Area ───────────────────────────────────── */
       /* ── Results Area ───────────────────────────────────── */
        #resultsArea {
            display: block;
            margin-top: 28px;
            text-align: right; /* יישור לימין */
            direction: rtl; /* כיוון טקסט מימין לשמאל */
            background: rgba(15, 15, 25, 0.6);
            padding: 24px;
            border-radius: 14px;
            min-height: 48px;
            line-height: 1.7;
            border-right: 4px solid #ff9f43; /* הפס הכתום עבר ימינה */
            color: #ccc;
            font-size: 0.95rem;
        }

        #resultsArea h3 {
            color: #ff9f43;
            margin-top: 22px;
            margin-bottom: 8px;
            border-bottom: 1px solid #2a2a3a;
            padding-bottom: 4px;
        }

        #resultsArea strong {
            color: #fff;
        }

        #resultsArea ul {
            padding-right: 20px; /* ריווח פנימי מצד ימין כדי שהנקודות יסתדרו */
            margin-top: 5px;
        }

        #resultsArea li {
            margin-bottom: 6px;
            color: #bbb;
        }

        /* ── Responsive ─────────────────────────────────────── */
        @media (max-width: 500px) {
            .container {
                padding: 24px 18px 28px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .input-row {
                flex-direction: column;
            }

            #searchBtn {
                width: 100%;
            }
        }
    </style>
</head>
